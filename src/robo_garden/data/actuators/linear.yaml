    type: linear
    force_n: 42.0
    speed_mps: 0.012
    stroke_mm: 50
    torque_nm: null
    speed_rpm: null
    voltage: 12.0
    weight_g: 34.0
    price_usd: 70.00
    max_angle_deg: null
